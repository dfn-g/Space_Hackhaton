<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orbit Debris Visualiser</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <!-- Canvas (Person 1 draws here) -->
  <canvas id="spaceCanvas"></canvas>
  <div id="hoverTooltip" class="tooltip is-hidden" role="status"></div>

  <!-- Top-left branding -->
  <header class="brand">
    <div class="brand__title">Orbit Debris</div>
    <div class="brand__subtitle">Awareness & Visualisation</div>
  </header>

  <!-- Controls panel (your job) -->
  <aside class="panel panel--controls" aria-label="Controls">
    <h2 class="panel__title">Controls</h2>

    <div class="control">
      <label class="control__label" for="densitySelect">Debris Density</label>
      <select id="densitySelect" class="control__select">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
    </div>

    <div class="control control--row">
      <button id="toggleRisk" class="btn btn--secondary" type="button">
        Risk View: Off
      </button>

      <button id="toggleSim" class="btn btn--primary" type="button">
        Run Simulation
      </button>
    </div>

    <div class="hint">
      Tip: Click a debris object to learn what it is.
    </div>
    <div id="riskLegend" class="legend is-hidden">
      <div class="legend__title">Risk Legend</div>
      <div class="legend__row"><span class="dot dot--low"></span> Low risk</div>
      <div class="legend__row"><span class="dot dot--med"></span> Medium risk</div>
      <div class="legend__row"><span class="dot dot--high"></span> High risk</div>
    </div>
  </aside>


  <!-- Info panel (opens when clicking debris; wired later) -->
  <aside id="infoPanel" class="panel panel--info is-hidden" aria-label="Object info">
    <div class="panel__header">
      <h2 class="panel__title" id="infoTitle">Object</h2>
      <button id="closeInfo" class="icon-btn" type="button" aria-label="Close">
        ✕
      </button>
    </div>

    <p class="panel__text" id="infoFact">
      Select an object to see details here.
    </p>

    <div class="panel__meta" id="infoMeta">
      <!-- optional meta fields later -->
    </div>
  </aside>

  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
